name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Generate Folder Android Otomatis
      run: flutter create . --platforms=android

    - name: Naikkan Batas Minimum Android SDK ke 24 (Perbaikan Bug FFmpeg)
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
        sed -i 's/minSdkVersion = .*/minSdkVersion = 24/g' android/local.properties || true
        sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle || true

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
