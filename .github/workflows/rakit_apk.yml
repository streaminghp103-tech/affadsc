name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Generate Folder Android Otomatis
      run: flutter create . --platforms=android

    - name: Suntik Batas SDK & Server Unduhan (Solusi Akurat FFmpeg)
      run: |
        # 1. Pastikan batas minimum Android SDK diatur ke 24
        sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
        sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle || true
        
        # 2. Tambahkan mavenCentral() ke dalam settings.gradle agar plugin bisa mengunduh FFmpeg
        cat << 'EOF' > android/settings.gradle
        pluginManagement {
            def flutterSdkPath = {
                def properties = new Properties()
                def file = new File(settingsDir, "local.properties")
                if (file.exists()) {
                    file.withReader("UTF-8") { reader -> properties.load(reader) }
                }
                def sdkPath = properties.getProperty("flutter.sdk")
                assert sdkPath != null, "flutter.sdk not set in local.properties"
                return sdkPath
            }()

            includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }

        plugins {
            id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
        }

        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }

        include ":app"
        EOF

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
