name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Regenerasi Folder Android (Pondasi Bersih)
      run: |
        # Buang sisa-sisa error lama dan buat pondasi Android baru
        rm -rf android
        flutter create . --platforms=android --org com.example
        
        # Suntikkan syarat mutlak FFmpeg (SDK 24) lewat jalur legal
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties
        echo "flutter.compileSdkVersion=34" >> android/local.properties

    - name: Kunci Master Repositori (Bypass Total Keamanan Gradle)
      run: |
        # 1. Matikan sistem pemblokir unduhan bawaan Flutter 3.22
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' android/settings.gradle || true
        sed -i 's/PREFER_SETTINGS/PREFER_PROJECT/g' android/settings.gradle || true
        
        # 2. Tanamkan "Kunci Master" ke otak server GitHub agar MEMAKSA unduh FFmpeg
        mkdir -p ~/.gradle
        cat << 'EOF' > ~/.gradle/init.gradle
        allprojects {
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                    maven { url 'https://jitpack.io' }
                }
            }
            repositories {
                google()
                mavenCentral()
                maven { url 'https://jitpack.io' }
            }
        }
        EOF

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
