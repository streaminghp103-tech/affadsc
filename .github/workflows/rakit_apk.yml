name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter (Gunakan Versi Stabil Terbaru)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Regenerasi Folder Android & Kunci Syarat SDK
      run: |
        rm -rf android
        flutter create . --platforms=android --org com.example
        
        # Sembuhkan peringatan error "SDK version 34" dan "minSdkVersion 24"
        sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
        sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
        sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Operasi Pembedahan Cache (Solusi Tuntas JCenter/Maven)
      run: |
        # 1. Buka gembok keamanan dari luar
        sed -i 's/RepositoriesMode.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_PROJECT/g' android/settings.gradle || true
        sed -i 's/RepositoriesMode.PREFER_SETTINGS/RepositoriesMode.PREFER_PROJECT/g' android/settings.gradle || true
        
        echo "" >> android/build.gradle
        echo "allprojects { repositories { google(); mavenCentral() } }" >> android/build.gradle

        # 2. EKSEKUSI UTAMA: Cari semua plugin yang terunduh dan hapus jalur server zombie secara paksa
        find $PUB_CACHE/hosted -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +
        find $PUB_CACHE/hosted -name "build.gradle" -exec sed -i 's/maven { url "https:\/\/jcenter.bintray.com" }/mavenCentral()/g' {} +

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
