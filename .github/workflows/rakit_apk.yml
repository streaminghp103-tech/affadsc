name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Operasi Transplantasi FFmpeg & Syarat Android
      run: |
        # 1. Buat folder Android bersih
        rm -rf android
        flutter create . --platforms=android --org com.example
        
        # 2. Penuhi syarat Mutlak SDK secara legal
        sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle
        sed -i 's/flutter.compileSdkVersion/34/g' android/app/build.gradle
        sed -i 's/flutter.targetSdkVersion/34/g' android/app/build.gradle

        # 3. TRANSPLANTASI: Ganti plugin usang dengan versi utama yang sehat!
        sed -i 's/ffmpeg_kit_flutter_video/ffmpeg_kit_flutter/g' pubspec.yaml
        find lib -name "*.dart" -exec sed -i 's/ffmpeg_kit_flutter_video/ffmpeg_kit_flutter/g' {} +

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
