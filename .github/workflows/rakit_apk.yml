name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Buat Struktur Proyek Baru & Bersih
      run: |
        rm -rf android
        flutter create . --platforms=android --org com.example

    - name: Buka Gembok Keamanan Repositori & Set SDK (Kunci Utama FFmpeg)
      run: |
        # 1. Atur minimum SDK ke 24
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties
        echo "flutter.compileSdkVersion=34" >> android/local.properties
        
        # 2. Turunkan keamanan sistem Flutter 3.22 agar mengizinkan plugin mencari file di Maven
        sed -i 's/RepositoriesMode.PREFER_SETTINGS/RepositoriesMode.PREFER_PROJECT/g' android/settings.gradle || true
        sed -i 's/RepositoriesMode.FAIL_ON_PROJECT_REPOS/RepositoriesMode.PREFER_PROJECT/g' android/settings.gradle || true
        
        # 3. Suntikkan jalur unduhan Maven Central secara legal ke seluruh lini project
        echo "" >> android/build.gradle
        echo "allprojects { repositories { google(); mavenCentral() } }" >> android/build.gradle

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
