name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java (Mundur ke Java 11 agar cocok dengan FFmpeg)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Flutter (Versi Emas 3.16.9)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'

    - name: Buat Pondasi Android Super Bersih
      run: |
        # Buang semua file lama dan buat baru dengan mesin Flutter 3.16
        rm -rf android
        flutter create . --platforms=android --org com.example
        
        # Atur syarat wajib FFmpeg (SDK 24)
        echo "flutter.minSdkVersion=24" >> android/local.properties

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
