name: Pabrik Pembuat APK Otomatis

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.x'
        channel: 'stable'

    - name: Buat Struktur Proyek Baru & Bersih
      run: |
        # Hapus folder android lama yang korup akibat modifikasi teks sebelumnya
        rm -rf android
        # Buat ulang folder Android resmi yang fresh dengan package name com.example.affadsc
        flutter create . --platforms=android --org com.example

    - name: Konfigurasi Parameter SDK (Fix FFmpeg Tanpa Merusak File)
      run: |
        # Mengubah setelan minSdk secara legal langsung ke file local.properties atau gradle bawaan Flutter
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=34" >> android/local.properties
        echo "flutter.compileSdkVersion=34" >> android/local.properties

    - name: Ambil Dependency Proyek
      run: flutter pub get

    - name: Compile Jadi APK Android
      run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

    - name: Simpan Hasil APK Akhir
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-AI-Affiliate-Matang
        path: build/app/outputs/flutter-apk/app-release.apk
